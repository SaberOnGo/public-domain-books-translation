description: "一艘名为“莫尔腾号”的帆船在航行中逐渐遭遇来自雾、阴影和海面之外的未知侵扰。小说以幸存水手杰索普的证言展开，把精确的航海细节、船员间的恐惧传闻和逐步失控的甲板事故编织成冷峻而压迫的海洋恐怖叙事。"
author_bio: "威廉·霍普·霍奇森（William Hope Hodgson，1877-1918）是英国作家，早年有海上经历，后来从事写作。他的作品常结合航海经验、怪奇恐怖和对未知空间的想象，代表作包括《“格伦·卡里格”号的小艇》《边境屋》和《幽灵海盗》。第一次世界大战期间，他在西线阵亡。"
composition_background: "《幽灵海盗》出版于 1909 年，是霍奇森海洋怪奇小说的重要作品之一。作品延续了他对船上空间、航海劳动和未知恐怖的关注，用普通水手的第一人称回忆制造可信的现场感。恐怖并非来自直接解释，而是从夜班瞭望、帆桁异动、雾中船影和人员失踪中逐层累积。"
